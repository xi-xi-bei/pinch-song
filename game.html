<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Finger Pinch Symphony</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:sans-serif;color:#e0e0e0;touch-action:none;user-select:none}
#app{display:flex;width:100%;height:100%}
#side{width:280px;min-width:280px;height:100%;background:#0d0d18;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;align-items:center;padding:16px 12px;gap:8px;z-index:10;overflow-y:auto}
#side .stitle{font-size:11px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;width:100%;text-align:left;padding-left:4px}
#camwin{width:100%;height:192px;border-radius:10px;overflow:hidden;background:#000;border:2px solid rgba(255,255,255,.1);position:relative}
#camwin canvas{display:block;width:100%;height:100%}
#handstat{width:100%;display:flex;justify-content:space-around;gap:8px}
.hind{flex:1;text-align:center;padding:6px 4px;border-radius:8px;background:rgba(255,255,255,.04);font-size:11px;color:rgba(255,255,255,.4)}
.hind.present{background:rgba(0,255,136,.1);color:#0F0}
.hind .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;background:#F44}
.hind.present .dot{background:#0F0}
#mpstat{font-size:10px;color:#0F0;text-align:center;min-height:14px}
#legend{width:100%;display:flex;flex-direction:column;gap:2px}
.lrow{display:flex;align-items:center;padding:4px 6px;border-radius:6px;background:rgba(255,255,255,.03);font-size:10px;gap:6px}
.lswatch{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.lhand{color:rgba(255,255,255,.4);width:20px}
.lfinger{color:rgba(255,255,255,.7);width:38px}
.lnote{font-weight:700;width:20px}
.lbar{flex:1;height:3px;border-radius:1px;background:rgba(255,255,255,.06);overflow:hidden}
.lbarfill{height:100%;border-radius:1px;transition:width .08s}
#game{flex:1;height:100%;position:relative;overflow:hidden}
#game canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;width:100%;padding:12px 16px;display:flex;justify-content:space-between;z-index:40;pointer-events:none}
.hp{background:rgba(0,0,0,.5);backdrop-filter:blur(6px);border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600}
.hud-score{color:#FFD700}.hud-combo{color:#F44}.hud-level{color:#0BF}.hud-timer{color:#0F0}
#hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);padding:6px 16px;border-radius:16px;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);font-size:12px;color:#888;z-index:40;pointer-events:none;transition:opacity .4s}
.modal{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);z-index:200}
.modal.hidden{display:none}
.mtitle{font-size:40px;font-weight:800;margin-bottom:8px}
.msub{font-size:16px;color:#aaa;margin-bottom:24px;text-align:center;line-height:1.5}
.btn{padding:12px 32px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn:hover{transform:scale(1.05)}
.btn-p{background:#0F0;color:#0a0a0f;box-shadow:0 0 24px rgba(0,255,136,.3)}
</style></head>
<body>
<div id="app">
<div id="side">
<div class="stitle">📷 摄像头</div>
<div id="camwin"><canvas id="camcv"></canvas></div>
<div id="handstat"><div class="hind" id="lhs"><span class="dot"></span>左手</div><div class="hind" id="rhs"><span class="dot"></span>左手</div></div>
<div id="mpstat">等待中...</div>
<div class="stitle">🎵 指法对照表</div>
<div id="legend">
<div class="lrow"><span class="lswatch" style="background:#FF4466"></span><span class="lhand">左手</span><span class="lfinger">拇指+食指</span><span class="lnote" style="color:#FF4466">C4</span><span class="lbar"><span class="lbarfill" style="background:#FF4466;width:0%" data-lf="0"></span></span></div>
<div class="lrow"><span class="lswatch" style="background:#FF8822"></span><span class="lhand">左手</span><span class="lfinger">拇指+中指</span><span class="lnote" style="color:#FF8822">D4</span><span class="lbar"><span class="lbarfill" style="background:#FF8822;width:0%" data-lf="1"></span></span></div>
<div class="lrow"><span class="lswatch" style="background:#FFCC00"></span><span class="lhand">左手</span><span class="lfinger">拇指+无名</span><span class="lnote" style="color:#FFCC00">E4</span><span class="lbar"><span class="lbarfill" style="background:#FFCC00;width:0%" data-lf="2"></span></span></div>
<div class="lrow"><span class="lswatch" style="background:#88FF00"></span><span class="lhand">左手</span><span class="lfinger">拇指+小指</span><span class="lnote" style="color:#88FF00">F4</span><span class="lbar"><span class="lbarfill" style="background:#88FF00;width:0%" data-lf="3"></span></span></div>
<div class="lrow"><span class="lswatch" style="background:#00FF88"></span><span class="lhand">右手</span><span class="lfinger">拇指+食指</span><span class="lnote" style="color:#00FF88">G4</span><span class="lbar"><span class="lbarfill" style="background:#00FF88;width:0%" data-lf="4"></span></span></div>
<div class="lrow"><span class="lswatch" style="background:#00CCFF"></span><span class="lhand">右手</span><span class="lfinger">拇指+中指</span><span class="lnote" style="color:#00CCFF">A4</span><span class="lbar"><span class="lbarfill" style="background:#00CCFF;width:0%" data-lf="5"></span></span></div>
<div class="lrow"><span class="lswatch" style="background:#4488FF"></span><span class="lhand">右手</span><span class="lfinger">拇指+无名</span><span class="lnote" style="color:#4488FF">B4</span><span class="lbar"><span class="lbarfill" style="background:#4488FF;width:0%" data-lf="6"></span></span></div>
<div class="lrow"><span class="lswatch" style="background:#AA44FF"></span><span class="lhand">右手</span><span class="lfinger">拇指+小指</span><span class="lnote" style="color:#AA44FF">C5</span><span class="lbar"><span class="lbarfill" style="background:#AA44FF;width:0%" data-lf="7"></span></span></div>
</div></div>
<div id="game">
<canvas id="gcv"></canvas>
<canvas id="hov"></canvas>
<div id="hud"><div class="hp hud-score" id="hscore">得分: 0</div><div style="display:flex;gap:8px"><div class="hp hud-combo" id="hcombo">连击 0</div><div class="hp hud-level" id="hlevel">关卡: 1</div><div class="hp hud-timer" id="htimer">30s</div></div></div>
<div id="hint">🖐️ 将双手放入摄像头画面</div></div></div>
<div class="modal" id="mstart"><div class="mtitle">Finger Pinch Symphony</div><div class="msub">????????<br>????????? → ??????</div><button class="btn btn-p" id="bstart">开始游戏</button></div>
<div class="modal hidden" id="mover"><div class="mtitle" style="color:#F44">游戏结束</div><div class="msub">最终得分: <span id="fscore" style="color:#FFD700">0</span></div><button class="btn btn-p" id="bretry">再来一局</button></div>
<div class="modal hidden" id="mlvl"><div class="mtitle" style="color:#0F0">通关！</div><div class="msub" id="lvlmsg"></div><button class="btn btn-p" id="bnext">下一关</button></div>
<script><script><script>window._T={"t_camera": "📷 摄像头", "t_legend": "🎵 指法对照表", "t_left": "左手", "t_right": "右手", "t_thumb_index": "拇指+食指", "t_thumb_middle": "拇指+中指", "t_thumb_ring": "拇指+无名", "t_thumb_pinky": "拇指+小指", "t_title": "Finger Pinch Symphony", "t_sub": "双指捏合节奏游戏\\n不同手指与拇指对捏 → 发出不同音阶", "t_start": "开始游戏", "t_gameover": "游戏结束", "t_fscore": "最终得分", "t_retry": "再来一局", "t_lvl": "通关！", "t_next": "下一关", "t_score": "得分", "t_level": "关卡", "t_wait": "等待中...", "t_hint": "🖐️ 将双手放入摄像头画面", "t_loadcam": "⏳ 启动摄像头...", "t_loadmodel": "⏳ 加载手势模型...", "t_ready": "✅ 模型就绪，启动游戏...", "t_err": "错误"};Object.assign(window._T,{"t_lane_0": "左·食指", "t_lane_1": "左·中指", "t_lane_2": "左·无名", "t_lane_3": "左·小指", "t_lane_4": "右·食指", "t_lane_5": "右·中指", "t_lane_6": "右·无名", "t_lane_7": "右·小指", "t_touch_zone": "击打区域", "t_waiting_for": "Waiting ", "t_all_clear": "全连！最大连击: ", "t_level_done": " 关卡完成！", "t_level_prefix": "关卡 ", "t_accuracy": "精度"});document.addEventListener("DOMContentLoaded",function(){var T=window._T;var m={"t-camera":"t_camera","t-legend":"t_legend","t-lhs":"t_left","t-rhs":"t_right","t-mpstat":"t_wait","t-title":"t_title","t-sub":"t_sub","t-bstart":"t_start","t-gover":"t_gameover","t-bretry":"t_retry","t-lvl":"t_lvl","t-bnext":"t_next","t-hscore":"t_score","t-hlevel":"t_level","t-hint":"t_hint"};for(var id in m){var e=document.getElementById(id);if(e)e.innerHTML=T[m[id]]||id}var hs=document.querySelectorAll(".lhand");for(var i=0;i<hs.length;i++)hs[i].textContent=T[i<4?"t_left":"t_right"];var fs=document.querySelectorAll(".lfinger");var fn=["t_thumb_index","t_thumb_middle","t_thumb_ring","t_thumb_pinky"];for(var i=0;i<fs.length;i++)fs[i].textContent=T[fn[i%4]]})</script>
<script src="gesture-base.js?v=fix"></script>
<script src="game-core.js?v=fix"></script>
<script>
var hint=document.getElementById("hint"),hintEl=hint;
var camCv=document.getElementById("camcv"),camCtx=camCv.getContext("2d");
var gameCv=document.getElementById("gcv"),gameCtx;
var hovCv=document.getElementById("hov"),hovCtx=hovCv.getContext("2d");
var lhs=document.getElementById("lhs"),rhs=document.getElementById("rhs");
var mpstat=document.getElementById("mpstat");
var hscore=document.getElementById("hscore"),hcombo=document.getElementById("hcombo");
var hlevel=document.getElementById("hlevel"),htimer=document.getElementById("htimer");
var bstart=document.getElementById("bstart"),mstart=document.getElementById("mstart");
var mover=document.getElementById("mover"),bretry=document.getElementById("bretry");
var mlvl=document.getElementById("mlvl"),bnext=document.getElementById("bnext");
var fscore=document.getElementById("fscore"),lvlmsg=document.getElementById("lvlmsg");
var lfills=document.querySelectorAll("[data-lf]"),lrows=document.querySelectorAll(".lrow");
var gesture=null,hl=null,videoEl=null;

function resize(){
  var dpr=window.devicePixelRatio||1,w=document.getElementById("game").clientWidth,h=document.getElementById("game").clientHeight;
  gameCv.width=w*dpr;gameCv.height=h*dpr;gameCv.style.width=w+"px";gameCv.style.height=h+"px";
  hovCv.width=w*dpr;hovCv.height=h*dpr;hovCv.style.width=w+"px";hovCv.style.height=h+"px";
}
window.addEventListener("resize",resize);resize();
gameCtx=gameCv.getContext("2d");

function drawSkeleton(lm){
  camCtx.save();camCtx.scale(-1,1);
  var conns=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[0,17],[17,18],[18,19],[19,20]];
  camCtx.strokeStyle="#0F0";camCtx.lineWidth=1;
  for(var ci=0;ci<conns.length;ci++){
    var a=lm[conns[ci][0]],b=lm[conns[ci][1]];if(!a||!b)continue;
    camCtx.beginPath();camCtx.moveTo((a.x-1)*camCv.width,a.y*camCv.height);camCtx.lineTo((b.x-1)*camCv.width,b.y*camCv.height);camCtx.stroke();
  }
  for(var li=0;li<21;li++){
    var p=lm[li];if(!p)continue;
    camCtx.beginPath();camCtx.arc((p.x-1)*camCv.width,p.y*camCv.height,2,0,Math.PI*2);
    camCtx.fillStyle=(li===4||li===8||li===12||li===16||li===20)?"#F44":"#FFF";camCtx.fill();
  }
  camCtx.restore();
}

bstart.addEventListener("click",async function(){
  mstart.classList.add("hidden");
  hintEl.textContent="⏳ ?????...";hintEl.style.opacity="1";
  try{
    var stream=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:"user"},audio:false});
    videoEl=document.createElement("video");videoEl.playsinline=true;videoEl.srcObject=stream;
    document.body.appendChild(videoEl);videoEl.style.cssText="position:absolute;top:-9999px;left:0;width:320px;height:240px";
    await videoEl.play();
    var w=0;while(videoEl.videoWidth===0&&w<50){await new Promise(function(r){setTimeout(r,100)});w++;}
    if(videoEl.videoWidth===0)throw new Error("Video not ready");
    camCv.width=320;camCv.height=240;

    hintEl.textContent="⏳ ??????...";
    var tv=await import("/jsd/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs");
    var vision=await tv.FilesetResolver.forVisionTasks("/jsd/npm/@mediapipe/tasks-vision@0.10.18/wasm");
    hl=await tv.HandLandmarker.createFromOptions(vision,{
      baseOptions:{modelAssetPath:"/models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",delegate:"GPU"},
      runningMode:"VIDEO",numHands:2
    });

    gesture=new GestureBase({interactionZone:{x:0.05,y:0.05,w:0.9,h:0.9},showSkeleton:true});
    await gesture.init(videoEl,hovCv,hl);

    hintEl.textContent="? ?????????...";
    if(window.Game&&window.Game.start){
      window.Game.start({canvas:gameCv,gesture:gesture,hud:{score:hscore,lives:hcombo,level:hlevel,timer:htimer},screens:{gameOver:mover,levelComplete:mlvl},finalScoreEl:fscore,levelCompleteMsg:lvlmsg,legendFills:lfills,legendRows:lrows});
    }
    hintEl.style.opacity="0";

    function renderLoop(){
      if(!videoEl||videoEl.videoWidth===0){requestAnimationFrame(renderLoop);return}
      camCtx.save();camCtx.clearRect(0,0,camCv.width,camCv.height);camCtx.scale(-1,1);camCtx.drawImage(videoEl,-camCv.width,0,camCv.width,camCv.height);camCtx.restore();
      var allLm=gesture.allLandmarks;
      if(allLm&&allLm.length>0)allLm.forEach(function(lm){drawSkeleton(lm)});
      var hands=allLm?allLm.length:0;
      mpstat.textContent="R:"+(gesture._mpResultCount||0)+" H:"+hands+(hands>0?" DETECTED":"");
      var lhi=-1,rhi=-1;
      for(var i=0;i<gesture.handCount;i++){var hd=gesture.getHandHandedness(i);if(hd==="Left")lhi=i;if(hd==="Right")rhi=i;}
      lhs.className="hind"+(lhi>=0?" present":"");rhs.className="hind"+(rhi>=0?" present":"");
      for(var i=0;i<8;i++){var hi=i<4?lhi:rhi;if(hi<0){if(lfills[i])lfills[i].style.width="0%";continue}var fn=["index","middle","ring","pinky"][i%4];var dist=gesture.pinchDistanceForHand(hi,fn);var fill=dist<0.12?Math.round((1-dist/0.12)*100):0;if(lfills[i])lfills[i].style.width=fill+"%";if(lrows[i])lrows[i].style.background=fill>20?"rgba(0,255,136,0.15)":""}
      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);
  }catch(err){
  var msg = err && err.message ? err.message : String(err);
  var stack = err && err.stack ? err.stack : "";
  alert("ERROR:\n" + msg + "\n\n" + stack.split("\n").slice(0,5).join("\n"));
  hintEl.textContent="ERROR: "+msg;
  hintEl.style.opacity="1";
  hintEl.style.color="red";
  hintEl.style.fontSize="16px";
  hintEl.style.bottom="50%";
  hintEl.style.background="rgba(255,0,0,0.8)";
  mstart.classList.remove("hidden")
}
});
bretry.addEventListener("click",function(){mover.classList.add("hidden");if(window.Game&&window.Game.restart)window.Game.restart()});
bnext.addEventListener("click",function(){mlvl.classList.add("hidden");if(window.Game&&window.Game.nextLevel)window.Game.nextLevel()});
</script></body></html>
